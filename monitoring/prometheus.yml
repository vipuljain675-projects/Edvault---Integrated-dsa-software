global:
  scrape_interval: 15s

scrape_configs:
  # Scraping metrics from Next.js server endpoints
  - job_name: 'eduvault-app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['app:3005']

  # Scraping metrics from Host Machine hardware
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
